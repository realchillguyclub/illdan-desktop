name: CD - Build on main

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # MSI 패키징 시 WiX가 필요한 경우가 많음 (Windows)
      - name: Install WiX (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install wixtoolset -y

      # macOS/Linux에서 gradlew 실행 권한 필요 (macOS)
      - name: Grant execute permission for gradlew (macOS)
        if: matrix.os == 'macos-latest'
        run: chmod +x ./gradlew

      - name: Package (macOS - DMG)
        if: matrix.os == 'macos-latest'
        run: ./gradlew :composeApp:packageDmg --stacktrace
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Package (Windows - MSI)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\gradlew.bat :composeApp:packageMsi --stacktrace
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            composeApp/build/compose/binaries/main/dmg/**
      
      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            composeApp/build/compose/binaries/main/msi/**
